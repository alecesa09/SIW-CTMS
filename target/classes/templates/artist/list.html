<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Film - SIW</title>
    <link rel="stylesheet" href="/stile.css?version=4" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    
    <header class="navbar">
        <div class="container">
            <a href="/artist" class="logo">
                <img src="/logo-siw.png" alt="Logo SIW"/>
            </a>
            <nav>
                <a href="/artist/new" class="btn-primary">Aggiungi artista</a>
            </nav>
        </div>
    </header>

    <main class="container page-content">
        <section class="hero-section">
            <h1>Esplora il Nostro Catalogo</h1>
            <p>Benvenuti nel database dei film. Scegliete un titolo per i dettagli.</p>
        </section>
        <div th:if="${artists.isEmpty()}" class="empty-state">
            <p>Non ci sono film nel sistema. Inizia aggiungendone uno!</p>
        </div>
        <div class="movie-grid">
            <div th:each="artist : ${artists}" class="movie-card">
                <div class="movie-poster-wrapper">
                    <img alt="Locandina" class="movie-poster" />
                </div>
                
                <div class="movie-info">
                    <h3 class="movie-title" th:text="${artist.name}">Titolo del Film</h3>
                    <div class="movie-meta">
                        <span th:text="${artist.placeOfBirth}">roma
						</span>
                    </div>
                    <a th:href="@{'/artist' + '/' + ${artist.id}}" class="btn-link">Vedi Dettagli →</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SIW. Progetto Film JPA.</p>
        </div>
    </footer>
</body>
</html>
