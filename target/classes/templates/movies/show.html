<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${movie != null} ? ${movie.title} : 'Film non trovato'">Dettaglio Film</title>
</head>
<body>

    <!-- Link per tornare indietro -->
    <a href="/movies">← Torna alla lista</a>
    <hr>

    <!-- CASO 1: Il film esiste nel Model -->
    <div th:if="${movie}">
        
        <h1 th:text="${movie.title}">Titolo Film</h1>
        <p>Anno di uscita: <span th:text="${movie.year}">2000</span></p>

        <!-- Gestione dell'immagine: mostra la locandina se c'è, altrimenti il logo di default -->
        <img th:if="${movie.UrlImage != null}" th:src="${movie.UrlImage}" alt="Locandina" width="250" />
        <img th:unless="${movie.UrlImage != null}" src="/logo-siw.png" alt="N/D" width="250" />
		
		<div th:if="${movie.director != null}"> 
		    regista: 
		    <a th:href="@{/artist/{id}(id=${movie.director.id})}">
		        <span th:text="${movie.director.name}">luca bianchi</span>
		    </a>
		</div>
        
		<div>
			attori:<span>
			<div th:each="attore : ${attori}" >
                <p th:text="${attore.name}">nome attore</p>
		    </div>
			</span>
		</div>
        
    </div>

    <!-- CASO 2: Il film NON esiste nel Model (es. ID errato) -->
    <div th:unless="${movie}">
        <h2>Ops! Film non trovato</h2>
        <p>Il film che stai cercando non è presente nel nostro database.</p>
    </div>

</body>
</html>
