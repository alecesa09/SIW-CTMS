<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Aggiungi Film</title>
</head>
<body>
    
    <h1>Aggiungi un Nuovo Film</h1>
    
    <form th:action="@{/movie}" method="POST" th:object="${movie}">
        
        <!-- Errori globali -->
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p> 
        </div>

        <!-- Titolo -->
        <label>Titolo del Film:</label>
        <input type="text" th:field="*{title}" />
        <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        <br><br>
        
        <!-- Anno -->
        <label>Anno di Uscita:</label>
        <input type="number" th:field="*{year}" />
        <span th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></span>
        <br><br>
        
        <!-- URL Immagine -->
        <label>URL Locandina:</label>
        <input type="url" th:field="*{UrlImage}" />
        <span th:if="${#fields.hasErrors('UrlImage')}" th:errors="*{UrlImage}"></span>
        <br><br>
		
		<!-- regista -->
		<label>Regista:</label>
		<select th:field="*{director}">
		    <option value="">-- Seleziona un regista --</option>
		    <option th:each="artista : ${artistsList}" 
		            th:value="${artista.id}" 
		            th:text="${artista.name}">
		    </option>
		</select>
		<span th:if="${#fields.hasErrors('director')}" th:errors="*{director}"></span>
		<br><br>
		
		<!-- attori -->
		<label>Regista:</label>
				<select name="artistId">
				    <option value="">-- Seleziona attore --</option>
				    <option th:each="artista : ${artistsList}" 
				            th:value="${artista.id}" 
				            th:text="${artista.name}">
				    </option>
				</select>
				<span th:if="${#fields.hasErrors('director')}" th:errors="*{director}"></span>
				<br><br>
        <!-- Pulsante Submit -->
        <button type="submit">Salva</button>
        
    </form>
	<br></br>
	<a href="/movies">fine</a>

</body>
</html>
