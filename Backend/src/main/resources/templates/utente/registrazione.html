<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="/css/CTMS.css">
	</head>
	<body>
		
		<form th:action="@{/registrazione}" method="POST" >
			
			<div th:object="${utente}">
				<ul style="color: red;" th:if="${#fields.hasGlobalErrors()}">
					    <li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
				</ul>
			    <h3>Dati Personali</h3>
			    <div>
					<label>Nome:</label>
					<span><input type="text" th:field="*{nome}" /></span>
					<span style="color: red;" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
				</div>
				<div>
					<label>Cognome:</label>
					<span><input type="text" th:field="*{cognome}" /></span>
					<span style="color: red;" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></span>
				</div>
				<div>
					<label>Email:</label>
					<span><input type="text" th:field="*{email}" /></span>
					<span style="color: red;" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
				</div>
			</div>
			
			<div th:object="${credentials}">
			    <h3>Dati di Accesso</h3>
				<div>
				    <label>Username:</label>
				    <input type="text" th:field="*{username}" required />
					<span style="color: red;" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
				</div>
				<div>
				 <label>Password:</label>
				 <input type="password" th:field="*{psw}" required />
				 <span style="color: red;" th:if="${#fields.hasErrors('psw')}" th:errors="*{psw}"></span>
				</div>
			</div>
		
		    <button type="submit">Registrati</button>
		</form>
	</body>
</html>
