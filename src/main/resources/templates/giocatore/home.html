<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dettaglio Giocatore</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        h1 { color: #333; }
        .card { 
            border: 1px solid #ddd; 
            padding: 20px; 
            border-radius: 8px; 
            max-width: 400px; 
            background-color: #f9f9f9; 
        }
        .label { font-weight: bold; color: #555; }
        .btn { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 8px 15px; 
            background-color: #0056b3; 
            color: white; 
            text-decoration: none; 
            border-radius: 4px; 
        }
        .btn:hover { background-color: #004085; }
        .error { color: red; font-style: italic; }
    </style>
</head>
<body>
    <div th:if="${giocatore == null}" class="error">
        Nessun giocatore trovato con questo identificativo.
    </div>
    <div th:if="${giocatore != null}" th:object="${giocatore}">
		
		<h1><span th:text="*{nome}">Mario</span><span th:text="*{cognome}">Rossi</span></h1>
		<div class="card" >
	        <p>
	            <span class="label">Data di nascita:</span> 
	            <span th:text="*{nascita != null ? #temporals.format(nascita, 'dd/MM/yyyy') : 'Dato non disponibile'}">01/01/1990</span>
	        </p>
			<p>
	            <span class="label">nazionalità:</span> 
	            <span th:text="*{nazionalita != null ? nazionalita : 'Dato non disponibile'}">italia</span>
	        </p>
	        <p>
	            <span class="label">Squadra:</span> 
	            <span th:text="*{squadra != null ? squadra.nome : 'Svincolato'}">Genoa</span>
	        </p>
	         <a class="btn" th:if="*{squadra != null}" th:href="@{/squadra/{id}(id=*{squadra.id})}">indietro alla squadra</a>
			 <a class="btn" th:if="*{squadra == null}" th:href="@{/}">torna alla lista</a>
		</div>
    </div>
</body>
</html>
