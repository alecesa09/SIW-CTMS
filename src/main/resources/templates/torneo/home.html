<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Torneo</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="/css/squadra-home.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .details { margin-bottom: 30px; background-color: #f9f9f9; padding: 15px; border-left: 5px solid #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .no-data { italic; color: #666; }
    </style>
</head>
<body>
	<nav th:replace="fragments/base.html :: navBar"></nav>
    <div class="details" th:object="${torneo}">
        <h1 th:text="*{nome} + ' (' + *{anno} + ')'">Nome Torneo (Anno)</h1>
        <p><strong>Descrizione:</strong></p>
        <p th:text="*{descrizione != null && !descrizione.isEmpty()} ? *{descrizione} : 'Nessuna descrizione disponibile.'">Descrizione del torneo...</p>
    	<a th:href="@{/tornei/calendario/{id}(id=*{id})}">link calendario</a>
	</div>

    <h2>Squadre Iscritte</h2>
    
    <table th:if="${not #lists.isEmpty(torneo.iscrizioni)}">
        <thead>
            <tr>
                <th>Squadra</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="iscrizione : ${iscrizioni}">
                <td>
                    <a th:href="@{/squadra/{id}(id=${iscrizione[0]})}" th:text="${iscrizione[1]}">Nome Squadra</a>
                </td>
            </tr>
        </tbody>
    </table>

    <p class="no-data" th:if="${#lists.isEmpty(torneo.iscrizioni)}">Nessuna squadra è ancora iscritta a questo torneo.</p>

    <p><a th:href="@{/tornei}">Torna all'elenco dei tornei</a></p>

</body>
</html>
